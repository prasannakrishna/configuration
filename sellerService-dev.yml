server:
  port: 8124

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/sellerdb
    username: prasannakrishnabhagwat
    password: admin123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: seller-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: "*"
  data:
    mongodb:
      uri: mongodb://localhost:27017/sellerdb
      auto-index-creation: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

multitenancy:
  enabled: true
  tenant-id-claim-name: tenantId
  default-tenant-id: public
  fail-on-missing-tenant: false
  schema-separator: _

service:
  core:
    rest-client:
      request-time-out: 30000
      response-time-out: 30000
      connection-time-out: 10000
    api-configs:
      inventory-skus:
        host: http://localhost:8083
        path: /api/v1/skus
        method: GET
      inventory-skus-create:
        host: http://localhost:8083
        path: /api/v1/skus
        method: POST
      inventory-skus-search:
        host: http://localhost:8083
        path: /api/v1/skus/search
        method: GET
      inventory-skus-seller-linked:
        host: http://localhost:8083
        path: /api/v1/skus/seller-linked
        method: GET
      inventory-sku-by-id:
        host: http://localhost:8083
        path: /api/v1/skus/{id}
        method: PUT
      inventory-sku-delete:
        host: http://localhost:8083
        path: /api/v1/skus/{id}
        method: DELETE
      inventory-sku-link-pack-config:
        host: http://localhost:8083
        path: /api/v1/skus/{id}/link-pack-config
        method: POST
      inventory-pack-configs:
        host: http://localhost:8083
        path: /api/v1/pack-configurations
        method: GET
      inventory-pack-configs-search:
        host: http://localhost:8083
        path: /api/v1/pack-configurations/search
        method: GET
      inventory-pack-configs-create:
        host: http://localhost:8083
        path: /api/v1/pack-configurations
        method: POST
      inventory-pack-config-by-id:
        host: http://localhost:8083
        path: /api/v1/pack-configurations/{id}
        method: PUT
      inventory-pack-config-delete:
        host: http://localhost:8083
        path: /api/v1/pack-configurations/{id}
        method: DELETE
      inventory-pack-config-ref-count:
        host: http://localhost:8083
        path: /api/v1/pack-configurations/{id}/reference-count
        method: GET
      inventory-pack-config-reference:
        host: http://localhost:8083
        path: /api/v1/pack-configurations/{id}/reference
        method: POST
      inventory-pack-config-unref:
        host: http://localhost:8083
        path: /api/v1/pack-configurations/{id}/reference
        method: DELETE
      inventory-create:
        host: http://localhost:8083
        path: /api/v1/inventories
        method: POST
      inventory-list:
        host: http://localhost:8083
        path: /api/v1/inventory
        method: GET
      inventory-products:
        host: http://localhost:8083
        path: /api/v1/products
        method: GET
      inventory-products-create:
        host: http://localhost:8083
        path: /api/v1/products
        method: POST
      inventory-product-by-id:
        host: http://localhost:8083
        path: /api/v1/products/{id}
        method: PUT
      inventory-product-delete:
        host: http://localhost:8083
        path: /api/v1/products/{id}
        method: DELETE
      community-search-keys-create:
        host: http://localhost:8081
        path: /search-keys/create
        method: POST

app:
  kafka:
    topics:
      inventory-publish: seller.inventory.publish
      shipping-orders: order.shipping.events

seller:
  workflow:
    qc-enabled: true
    grading-enabled: true
    packaging-enabled: true
    auto-publish-inventory: false
    default-expiry-days: 365
    batch-id-prefix: BATCH

minio:
  endpoint: http://localhost:9002
  access-key: minioadmin
  secret-key: minioadmin
  bucket: product-images

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

logging:
  config: classpath:logback-observability.xml

api:
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: seller-service
