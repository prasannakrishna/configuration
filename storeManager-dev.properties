spring.application.name=storeManager
server.port=8091
# PostgreSQL DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/storedb
spring.datasource.username=prasannakrishnabhagwat
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.bootstrap-servers=localhost:9092
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.group-id=store-manager-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Store Manager Kafka Topics
app.kafka.topics.store-events.name=store.events
app.kafka.topics.store-events.partitions=6
app.kafka.topics.store-events.replicas=3
app.kafka.topics.store-events.retention-ms=604800000
app.kafka.topics.store-events.cleanup-policy=delete
