spring:
  application:
    name: carrierService
  datasource:
    url: 'jdbc:mysql://localhost:3306/tmp'
    username: pocuser
    password: 'Admin@1234'
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
server:
  port: 8080
eureka:
  client:
    service-url:
      defaultZone: 'http://localhost:8761/eureka/'
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
